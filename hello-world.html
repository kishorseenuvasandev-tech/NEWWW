<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #080b15, #101829 45%, #15101e);
      font-family: Inter, "Segoe UI", sans-serif;
      color: #f7fbff;
    }

    .stage {
      width: min(92vw, 820px);
      padding: clamp(28px, 7vw, 76px);
      text-align: center;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 28px;
      background: rgba(10,18,32,.62);
      box-shadow: 0 30px 100px rgba(0,0,0,.42);
      backdrop-filter: blur(22px);
    }

    .badge {
      display: inline-block;
      margin-bottom: 24px;
      padding: 9px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,.07);
      color: #b7c5d6;
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(4rem, 13vw, 8.8rem);
      line-height: .88;
      background: linear-gradient(92deg, #fff 10%, #56d8ff, #73f6b2 62%, #fff 92%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    p {
      color: #b7c5d6;
      font-size: clamp(1rem, 2.4vw, 1.22rem);
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <main class="stage">
    <div class="badge">First page, big energy</div>
    <h1>Hello<br>World</h1>
    <p>A tiny HTML file with a little glass, glow, and polish.</p>
  </main>
</body>
</html>
