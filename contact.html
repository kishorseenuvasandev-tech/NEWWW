<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KISHORRRRR | Contact US</title>
  <style>
    :root { color-scheme: dark; --ink:#f7fbff; --muted:#b7c5d6; --aqua:#56d8ff; --mint:#73f6b2; --rose:#ff7aa8; --panel:rgba(10,18,32,.68); --line:rgba(255,255,255,.18); }
    * { box-sizing: border-box; }
    body { min-height:100vh; margin:0; display:grid; place-items:center; padding:28px; background:radial-gradient(circle at 18% 18%, rgba(86,216,255,.22), transparent 24rem), radial-gradient(circle at 82% 78%, rgba(115,246,178,.16), transparent 24rem), linear-gradient(135deg,#080b15,#101829 45%,#15101e); font-family:Inter,"Segoe UI",system-ui,sans-serif; color:var(--ink); }
    .stage { width:min(92vw,880px); padding:clamp(28px,7vw,72px); border:1px solid var(--line); border-radius:28px; background:var(--panel); box-shadow:0 30px 100px rgba(0,0,0,.42); backdrop-filter:blur(22px); }
    .center { text-align:center; }
    nav { display:flex; justify-content:center; flex-wrap:wrap; gap:12px; margin-bottom:34px; }
    nav a { color:var(--ink); text-decoration:none; padding:10px 16px; border:1px solid rgba(255,255,255,.18); border-radius:999px; background:rgba(255,255,255,.07); font-weight:700; transition:.2s ease; }
    nav a:hover, nav a.active { background:linear-gradient(92deg,var(--aqua),var(--mint)); color:#07111c; transform:translateY(-2px); }
    .badge { display:inline-block; margin-bottom:24px; padding:9px 16px; border-radius:999px; background:rgba(255,255,255,.07); color:var(--muted); font-size:.78rem; font-weight:700; letter-spacing:.16em; text-transform:uppercase; }
    h1 { margin:0; font-size:clamp(3.2rem,10vw,7.8rem); line-height:.92; background:linear-gradient(92deg,#fff 10%,var(--aqua),var(--mint) 62%,#fff 92%); -webkit-background-clip:text; background-clip:text; color:transparent; }
    p { max-width:680px; margin:26px auto 0; color:var(--muted); font-size:clamp(1rem,2.3vw,1.2rem); line-height:1.75; }
    .contact-card { margin-top:28px; padding:22px; border:1px solid rgba(255,255,255,.16); border-radius:20px; background:rgba(255,255,255,.06); }
    .contact-card a { color:var(--mint); font-weight:800; text-decoration:none; }

  </style>
</head>
<body>
  <main class="stage">

    <nav aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a class="active" href="contact.html">Contact</a>
    </nav>
    <div class="badge">Say hello</div>
    <h1>Contact</h1>
    <p>Want to connect? This page is ready for your real email, phone number, or social links whenever you want to add them.</p>
    <div class="contact-card">
      <p>Email: <a href="mailto:hello@example.com">hello@example.com</a></p>
      <p>Location: Somewhere creative, somewhere bright.</p>
    </div>
  </main>
</body>
</html>
